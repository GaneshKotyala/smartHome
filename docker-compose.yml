services:
  # ─── Next.js Frontend ───────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:4000/api/v1
    depends_on:
      - api
    restart: unless-stopped

  # ─── NestJS Backend API ─────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - CORS_ORIGIN=http://localhost:3000
      - DATABASE_PATH=./data/ganesh-home-hub.sqlite
    volumes:
      - api-data:/app/data
    restart: unless-stopped

volumes:
  api-data:
    driver: local
